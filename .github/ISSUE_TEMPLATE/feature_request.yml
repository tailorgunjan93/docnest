name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. The more detail you give, the faster we can evaluate and implement it.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: "As a DOCNEST user, I want to... so that..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered

  - type: dropdown
    id: area
    attributes:
      label: Which area does this affect?
      options:
        - Parser (new format support)
        - Normalizer (structure extraction)
        - Intelligence engine (LLM enrichment)
        - Embedder (new model support)
        - Quantizer
        - UDF writer/reader
        - Connector (new source)
        - CLI
        - Performance
        - Documentation
        - Other
