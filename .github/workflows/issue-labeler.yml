name: Issue Labeler & Auto-Response

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  label-and-respond:
    runs-on: ubuntu-latest
    steps:
      - name: Label issue and post first response
        uses: actions/github-script@v7
        with:
          script: |
            const title  = context.payload.issue.title.toLowerCase();
            const body   = (context.payload.issue.body || "").toLowerCase();
            const text   = title + " " + body;
            const issue  = context.payload.issue.number;

            // ── keyword → label map ──────────────────────────────────────────
            const rules = [
              { label: "bug",           words: ["error", "crash", "broken", "fails", "exception",
                                                "traceback", "wrong output", "incorrect", "not working",
                                                "oserror", "valueerror", "typeerror", "keyerror"] },
              { label: "enhancement",   words: ["feature", "add support", "improve", "enhancement",
                                                "request", "would be nice", "wish", "suggestion"] },
              { label: "question",      words: ["how to", "how do", "why does", "what is", "can i",
                                                "help", "confused", "not sure", "wondering"] },
              { label: "documentation", words: ["docs", "documentation", "readme", "example",
                                                "tutorial", "guide", "unclear", "typo"] },
              { label: "parser",        words: ["pdf", "docx", "xlsx", "html", "markdown",
                                                "parser", "parsing", "docling", "pymupdf",
                                                "table", "section", "heading"] },
              { label: "performance",   words: ["slow", "memory", "ram", "oom", "out of memory",
                                                "speed", "performance", "timeout", "large file",
                                                "600 page", "big pdf"] },
              { label: "llm",           words: ["openai", "groq", "ollama", "anthropic", "mistral",
                                                "cohere", "google", "together", "llm", "model",
                                                "api key", "token"] },
              { label: "embeddings",    words: ["embedding", "faiss", "chromadb", "vector",
                                                "similarity", "cosine", "bm25", "retrieval"] },
            ];

            // collect matching labels
            const toAdd = [];
            for (const rule of rules) {
              if (rule.words.some(w => text.includes(w))) {
                toAdd.push(rule.label);
              }
            }

            // always add "needs-triage" so nothing slips through
            toAdd.push("needs-triage");

            // apply labels (ignore 404 if label doesn't exist yet)
            if (toAdd.length > 0) {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  issue_number: issue,
                  labels: toAdd,
                });
              } catch (e) {
                console.log("Label error (label may not exist yet):", e.message);
              }
            }

            // ── friendly first response ──────────────────────────────────────
            const isBug      = toAdd.includes("bug");
            const isQuestion = toAdd.includes("question");
            const isFeature  = toAdd.includes("enhancement");

            let response = "";

            if (isBug) {
              response = `
  Thanks for the bug report! 🐛

  To help us reproduce and fix this faster, could you share:
  - DOCNEST version (\`pip show docnest-ai\`)
  - Python version and OS
  - A minimal code snippet that triggers the issue
  - The full traceback (if any)

  We'll take a look soon.
              `.trim();
            } else if (isQuestion) {
              response = `
  Good question! 👋

  While we look into this, you might find an answer in:
  - The [README](https://github.com/tailorgunjan93/docnest#readme) — especially the quickstart and query engine sections
  - Existing [closed issues](https://github.com/tailorgunjan93/docnest/issues?q=is%3Aissue+is%3Aclosed) which often have answers

  If none of those help, we'll reply here directly.
              `.trim();
            } else if (isFeature) {
              response = `
  Thanks for the suggestion! 💡

  Feature requests are tracked here. If this is something others upvote, it'll move up the roadmap.
  Feel free to add more context about your use case — it helps a lot when prioritising.
              `.trim();
            } else {
              response = `
  Thanks for opening this issue! 👋

  We've tagged it automatically — someone will follow up soon.
  If you have more context or a reproduction case, feel free to add it.
              `.trim();
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: issue,
              body: response,
            });
